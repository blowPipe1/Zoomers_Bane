databaseChangeLog:
  - changeSet:
      id: 8
      author: myself
      changes:
        - createTable:
            tableName: vacancies
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: category_id
                  type: INTEGER
                  constraints:
                    nullable: false
                    foreignKeyName: fk_vacancies_category
                    referencedTableName: categories
                    referencedColumnNames: id
              - column:
                  name: salary
                  type: REAL
              - column:
                  name: exp_from
                  type: INTEGER
              - column:
                  name: exp_to
                  type: INTEGER
              - column:
                  name: is_active
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: author_id
                  type: INTEGER
                  constraints:
                    nullable: false
                    foreignKeyName: fk_vacancies_author
                    referencedTableName: users
                    referencedColumnNames: id
              - column:
                  name: created_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: update_time
                  type: TIMESTAMP
                  constraints:
                    nullable: false