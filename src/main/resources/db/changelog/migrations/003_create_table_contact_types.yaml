databaseChangeLog:
  - changeSet:
      id: 3
      author: myself
      changes:
        - createTable:
            tableName: contact_types
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false