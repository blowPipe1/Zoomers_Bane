databaseChangeLog:
  - changeSet:
      id: 9
      author: myself
      changes:
        - createTable:
            tableName: responded_applicants
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: resume_id
                  type: INTEGER
                  constraints:
                    nullable: false
                    foreignKeyName: fk_response_resume
                    referencedTableName: resumes
                    referencedColumnNames: id
              - column:
                  name: vacancy_id
                  type: INTEGER
                  constraints:
                    nullable: false
                    foreignKeyName: fk_response_vacancy
                    referencedTableName: vacancies
                    referencedColumnNames: id
              - column:
                  name: confirmation
                  type: BOOLEAN