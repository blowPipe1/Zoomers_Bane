databaseChangeLog:
  - changeSet:
      id: 10
      author: myself
      changes:
        - createTable:
            tableName: messages
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: responded_applicants_id
                  type: INTEGER
                  constraints:
                    nullable: false
                    foreignKeyName: fk_messages_response
                    referencedTableName: responded_applicants
                    referencedColumnNames: id
              - column:
                  name: content
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: timestamp
                  type: TIMESTAMP
                  constraints:
                    nullable: false