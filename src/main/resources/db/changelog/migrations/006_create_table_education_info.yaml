databaseChangeLog:
  - changeSet:
      id: 6
      author: myself
      changes:
        - createTable:
            tableName: education_info
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: resume_id
                  type: INTEGER
                  constraints:
                    nullable: false
                    foreignKeyName: fk_education_resume
                    referencedTableName: resumes
                    referencedColumnNames: id
              - column:
                  name: institution
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: program
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: start_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: end_date
                  type: DATE
              - column:
                  name: degree
                  type: TEXT
