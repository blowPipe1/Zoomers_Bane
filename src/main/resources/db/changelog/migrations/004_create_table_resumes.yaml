databaseChangeLog:
  - changeSet:
      id: 4
      author: myself
      changes:
        - createTable:
            tableName: resumes
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: applicant_id
                  type: INTEGER
                  constraints:
                    nullable: false
                    foreignKeyName: fk_resumes_applicant
                    referencedTableName: users
                    referencedColumnNames: id
              - column:
                  name: name
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: category_id
                  type: INTEGER
                  constraints:
                    nullable: false
                    foreignKeyName: fk_resumes_category
                    referencedTableName: categories
                    referencedColumnNames: id
              - column:
                  name: salary
                  type: REAL
              - column:
                  name: is_active
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: created_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: update_time
                  type: TIMESTAMP
                  constraints:
                    nullable: false