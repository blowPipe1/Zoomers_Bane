databaseChangeLog:
  - changeSet:
      id: 2
      author: myself
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: parent_id
                  type: INTEGER
                  constraints:
                    foreignKeyName: fk_categories_parent
                    referencedTableName: categories
                    referencedColumnNames: id
